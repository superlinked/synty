{{- if .Values.builder.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "synty.fullname" . }}-builder
spec:
  schedule: {{ .Values.builder.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "synty.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: builder
        spec:
          serviceAccountName: {{ include "synty.serviceAccountName" . }}
          restartPolicy: OnFailure
          containers:
            - name: builder
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/bin/sh", "-ec"]
              args:
                - |
                  synty init "$SYNTY_BUCKET" --machine "$SYNTY_MACHINE" \
                    --no-build --no-autostart \
                    {{- if .Values.awsProfile }} --aws-profile "$SYNTY_AWS_PROFILE"{{- end }}
                  synty build --bucket "$SYNTY_BUCKET" --machine "$SYNTY_MACHINE" --no-track
              env:
                - { name: SYNTY_HOME, value: /var/synty }
                - { name: SYNTY_BUCKET, value: {{ required "bucket is required" .Values.bucket | quote }} }
                - { name: SYNTY_MACHINE, value: {{ printf "%s-builder" .Values.machine | quote }} }
                {{- if .Values.awsProfile }}
                - { name: SYNTY_AWS_PROFILE, value: {{ .Values.awsProfile | quote }} }
                {{- end }}
              volumeMounts:
                - { name: synty-home, mountPath: /var/synty }
              resources:
                {{- toYaml .Values.builder.resources | nindent 16 }}
          volumes:
            - name: synty-home
              persistentVolumeClaim:
                claimName: {{ include "synty.claimName" . }}
{{- end }}
