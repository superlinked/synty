{{- if .Values.builder.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "synty.fullname" . }}-builder
spec:
  schedule: {{ .Values.builder.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "synty.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: builder
        spec:
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          serviceAccountName: {{ include "synty.serviceAccountName" . }}
          restartPolicy: OnFailure
          containers:
            - name: builder
              image: {{ include "synty.image" . | quote }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              command: ["synty"]
              args:
                - build
                - --bucket
                - {{ required "bucket is required" .Values.bucket | quote }}
                - --machine
                - {{ printf "%s-builder" .Values.machine | quote }}
                - --no-track
              env:
                - { name: SYNTY_HOME, value: /var/synty }
                {{- if .Values.bucketRegion }}
                - { name: AWS_REGION, value: {{ .Values.bucketRegion | quote }} }
                - { name: AWS_DEFAULT_REGION, value: {{ .Values.bucketRegion | quote }} }
                {{- end }}
                {{- if .Values.awsProfile }}
                - { name: AWS_PROFILE, value: {{ .Values.awsProfile | quote }} }
                {{- end }}
              volumeMounts:
                - { name: synty-home, mountPath: /var/synty }
                - { name: tmp, mountPath: /tmp }
              resources:
                {{- toYaml .Values.builder.resources | nindent 16 }}
          volumes:
            - { name: tmp, emptyDir: {} }
            - name: synty-home
              {{- if .Values.persistence.enabled }}
              persistentVolumeClaim:
                claimName: {{ include "synty.claimName" . }}
              {{- else }}
              emptyDir: {}
              {{- end }}
{{- end }}
